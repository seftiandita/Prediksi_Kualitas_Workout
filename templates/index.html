<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediksi Workout</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #4facfe, #00f2fe);
            background-size:400% 400%;
            animation:bgAnimation 10s ease infinite;
        }

        @keyframes bgAnimation{
            0%{
                background-position:0% 50%;
            }
            50%{
                background-position:100% 50%;
            }
            100%{
                background-position:0% 50%;
            }
        }

        .container{
            width:400px;
            background:white;
            padding:35px;
            border-radius:25px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;

            animation:fadeIn 1s ease;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .emoji{
            font-size:60px;
            animation:bounce 2s infinite;
        }

        @keyframes bounce{
            0%,100%{
                transform:translateY(0);
            }
            50%{
                transform:translateY(-10px);
            }
        }

        h1{
            color:#1e3c72;
            margin-top:10px;
            margin-bottom:10px;
        }

        p{
            color:gray;
            margin-bottom:25px;
        }

        label{
            display:block;
            text-align:left;
            margin-bottom:8px;
            font-weight:bold;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border-radius:12px;
            border:1px solid #ccc;
            margin-bottom:20px;
            font-size:16px;
            transition:0.3s;
        }

        input:focus{
            border-color:#4facfe;
            box-shadow:0 0 10px rgba(79,172,254,0.5);
            outline:none;
        }

        button{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:linear-gradient(90deg,#1e3c72,#4facfe);
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
            font-weight:bold;
        }

        button:hover{
            transform:scale(1.05);
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
        }

        .result{
            margin-top:25px;
            padding:18px;
            border-radius:15px;
            background:#eef5ff;
            color:#1e3c72;
            font-size:20px;
            font-weight:bold;

            animation:resultAnimation 0.7s ease;
        }

        @keyframes resultAnimation{
            from{
                opacity:0;
                transform:scale(0.8);
            }
            to{
                opacity:1;
                transform:scale(1);
            }
        }

    </style>

</head>
<body>

    <div class="container">

        <div class="emoji">🏋️‍♂️</div>

        <h1>Prediksi Kualitas Workout</h1>

        <p>
            Masukkan durasi workout dan jumlah kalori terbakar
        </p>

        <form action="/predict" method="post">

            <label>Durasi Workout (jam)</label>

            <input
                type="number"
                step="0.1"
                name="duration"
                placeholder="Contoh: 1.5"
                required
            >

            <label>Kalori Terbakar</label>

            <input
                type="number"
                name="calories"
                placeholder="Contoh: 350"
                required
            >

            <button type="submit">
                Prediksi Sekarang
            </button>

        </form>

        {% if prediction_text %}

        <div class="result">
            {{ prediction_text }}
        </div>

        {% endif %}

    </div>

</body>
</html>
